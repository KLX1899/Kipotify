services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kipotify
      POSTGRES_USER: kipotify
      POSTGRES_PASSWORD: kipotify
    ports:
      - "5432:5432"
    volumes:
      - kipotify_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kipotify -d kipotify"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://kipotify:kipotify@postgres:5432/kipotify?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  kipotify_postgres:
